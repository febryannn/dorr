local_costmap:
  global_frame: map
  robot_base_frame: base_link
  update_frequency: 3.0
  static_map: false
  rolling_window: true
  width: 8.0
  height: 8.0
  resolution: 0.05
  
  plugins:
  - {name: static,                  type: "costmap_2d::StaticLayer"}
  - {name: obstacles,               type: "costmap_2d::ObstacleLayer"}
  - {name: inflation,               type: "costmap_2d::InflationLayer"}