# rosparam load bridge.yaml
# ros2 run ros1_bridge parameter_bridge

topics:
  -
    topic: /tf
    type: tf2_msgs/msg/TFMessage
    queue_size: 1
    qos:
      history: keep_all
      duarbility: transient_local
  -
    topic: /tf_static
    type: tf2_msgs/msg/TFMessage
    queue_size: 1
    qos:
      history: keep_all
      duarbility: transient_local
  -
    topic: /map_cloud
    type: sensor_msgs/msg/PointCloud2
    queue_size: 1
    qos:
      history: keep_all
      duarbility: transient_local
  -
    topic: /scan
    type: sensor_msgs/msg/LaserScan
    queue_size: 1
    qos:
      history: keep_all
      duarbility: transient_local
  -
    topic: /mcl_3dl/particles
    type: geometry_msgs/msg/PoseArray
    queue_size: 1
    qos:
      history: keep_all
      duarbility: transient_local
  -
    topic: /mapgrid_i
    type: nav_msgs/msg/OccupancyGrid
    queue_size: 1
    qos:
      history: keep_all
      duarbility: transient_local
  -
    topic: /move_base/global_costmap/costmap
    type: nav_msgs/msg/OccupancyGrid
    queue_size: 1
    qos:
      history: keep_all
      duarbility: transient_local
  -
    topic: /move_base/local_costmap/costmap
    type: nav_msgs/msg/OccupancyGrid
    queue_size: 1
    qos:
      history: keep_all
      duarbility: transient_local
  -
    topic: /move_base/GlobalPlanner/plan
    type: nav_msgs/msg/Path
    queue_size: 1
    qos:
      history: keep_all
      duarbility: transient_local
  -
    topic: /move_base/TebLocalPlannerROS/local_plan
    type: nav_msgs/msg/Path
    queue_size: 1
    qos:
      history: keep_all
      duarbility: transient_local
  -
    topic: /goal_pose
    type: geometry_msgs/msg/PoseStamped
    queue_size: 1
    qos:
      history: keep_all
      duarbility: transient_local
  -
    topic: /initialpose
    type: geometry_msgs/msg/PoseWithCovarianceStamped
    queue_size: 1
    qos:
      history: keep_all
      duarbility: transient_local
  -
    topic: /robot_pos
    type: geometry_msgs/msg/Pose
    queue_size: 1
    qos:
      history: keep_all
      duarbility: transient_local
